name: build-windows-installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # needed for softprops/action-gh-release

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Install Inno Setup (choco)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Inno Setup installed"

      # Dynamic link + delay-load: we ship sherpa-onnx DLLs next to our DLL
      # and resolve them from DllMain via SetDllDirectoryW. Rust build stays
      # fast (~10-15 min cold) because no C++ sources are compiled here.
      - name: Build stt_sapi5 release DLL (dynamic + delay-load)
        shell: pwsh
        timeout-minutes: 30
        run: |
          cargo build --release `
            --package stt_sapi5_xiao_ya `
            --target x86_64-pc-windows-msvc

      - name: Download sherpa-onnx Windows shared runtime
        shell: pwsh
        run: |
          $url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.9/sherpa-onnx-v1.12.9-win-x64-shared.tar.bz2"
          Invoke-WebRequest -Uri $url -OutFile sherpa-onnx-runtime.tar.bz2
          tar -xjf sherpa-onnx-runtime.tar.bz2
          $libdir = "sherpa-onnx-v1.12.9-win-x64-shared\lib"
          Write-Host "--- sherpa runtime DLLs ---"
          Get-ChildItem $libdir\*.dll | Select-Object Name,Length

      - name: Download xiao_ya sherpa-onnx model (fp16)
        shell: pwsh
        run: |
          $url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-zh_CN-xiao_ya-medium-fp16.tar.bz2"
          Invoke-WebRequest -Uri $url -OutFile xiao_ya.tar.bz2
          tar -xjf xiao_ya.tar.bz2
          Rename-Item vits-piper-zh_CN-xiao_ya-medium-fp16 xiao_ya
          Get-ChildItem xiao_ya | Select-Object Name,Length

      - name: Download VC++ Redistributable 2015-2022 x64
        shell: pwsh
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          Invoke-WebRequest -Uri $url -OutFile VC_redist.x64.exe
          Get-Item VC_redist.x64.exe | Select-Object Name,Length

      - name: Stage Inno Setup payload
        shell: pwsh
        run: |
          $payload = "installer\payload"
          New-Item -ItemType Directory -Force -Path $payload | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\stt_xiao_ya_sapi5.dll $payload\
          Copy-Item -Recurse xiao_ya $payload\xiao_ya
          Copy-Item VC_redist.x64.exe $payload\
          # sherpa-onnx runtime DLLs (delay-loaded, resolved via SetDllDirectoryW)
          $libdir = "sherpa-onnx-v1.12.9-win-x64-shared\lib"
          Copy-Item $libdir\sherpa-onnx-c-api.dll $payload\
          Copy-Item $libdir\sherpa-onnx-cxx-api.dll $payload\
          Copy-Item $libdir\onnxruntime.dll $payload\
          Copy-Item $libdir\onnxruntime_providers_shared.dll $payload\
          Copy-Item $libdir\cargs.dll $payload\
          Write-Host "--- payload contents ---"
          Get-ChildItem -Recurse $payload | Select-Object FullName,Length

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc installer\stt_xiao_ya.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          Get-ChildItem installer\output | Select-Object FullName,Length

      - name: Upload Setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: STT-xiao_ya-Setup
          path: installer/output/STT-xiao_ya-Setup.exe
          retention-days: 30

      - name: Publish GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/STT-xiao_ya-Setup.exe
          name: ${{ github.ref_name }}
          body: |
            STT 可爱少女 (xiao_ya) 中文 Windows SAPI5 语音包

            双击 `STT-xiao_ya-Setup.exe` → 允许 UAC → 一路下一步 → 重启 WoW。
